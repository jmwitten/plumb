version: 1
findings:
  - id: C1
    subject: caddy overview render — context arm occludes the built work
    suspected_issue: The solid sofa-arm context dominates ordinary oblique views and can hide the caddy shell.
    severity: MEDIUM
    visual_evidence: v1_iso.png is context-heavy; g1_iso.png hides the arm and exposes all three hardwood panels.
    renders:
      - path: outputs/armchair_caddy/views/v1_iso.png
      - path: outputs/armchair_caddy/views/g1_iso.png
    invariant_family: UNKNOWN
    recommended_action: Keep the arm-hidden overview and automate context ghosting in the shared renderer later.
    resolution:
      status: unresolved
      note: ""
    notes: Presentation concern only; the arm is correctly modeled as existing fit context.

  - id: C2
    subject: loose gravity saddle — sliding and off-center stability
    suspected_issue: The panel-defined 1/4-inch side clearances permit removal but do not prove resistance to sliding or tipping.
    severity: MEDIUM
    visual_evidence: v2_front.png and z3_gap.png show the side-panel fit and deliberate clearance around the arm.
    renders:
      - path: outputs/armchair_caddy/views/v2_front.png
      - path: outputs/armchair_caddy/views/z3_gap.png
    invariant_family: Support/Stability representation
    recommended_action: Preserve the UNKNOWN verdict and require a representative empty-caddy stability and fit test before hot-drink use.
    resolution:
      status: documented-assumption-or-unknown
      note: The coverage matrix and build documents say stability, sliding resistance, insertion travel, and structural capacity are not analyzed; no clean claim is inferred.

  - id: C3
    subject: cup opening — locating ring rests over the sofa arm
    suspected_issue: The full-thickness bore has no separate floor, so cup fit depends on the intended cup and the actual arm surface.
    severity: LOW
    visual_evidence: v4_top.png and z1_cup.png show the centered opening and the arm immediately below it.
    renders:
      - path: outputs/armchair_caddy/views/v4_top.png
      - path: outputs/armchair_caddy/views/z1_cup.png
    invariant_family: Functional use
    recommended_action: Keep the intended cup as a required loose-fit template and do not claim universal cup compatibility.
    resolution:
      status: documented-assumption-or-unknown
      note: The bore is intentionally a locating ring; the manual requires a physical cup-fit check and retains the hot-drink warning.

  - id: C4
    subject: reinforced-miter construction — corner keys must read in the views
    suspected_issue: The small diagonal hardwood keys can be hard to distinguish in a whole-model render.
    severity: LOW
    visual_evidence: g2_joint.png provides an arm-hidden close view of both keys crossing one representative 45-degree corner.
    renders:
      - path: outputs/armchair_caddy/views/g2_joint.png
      - path: outputs/armchair_caddy/views/g3_underside.png
    invariant_family: UNKNOWN
    recommended_action: Retain the dedicated joint zoom and geometry-derived key stations in the illustrated manual.
    resolution:
      status: fixed-by-revision
      note: The current renderer colors the four corner keys separately, the arm-hidden joint zoom exposes one complete pair, and the manual dimensions both paired stations from the compiled geometry.
