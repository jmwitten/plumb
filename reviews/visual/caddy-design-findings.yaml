version: 1
findings:
  - id: D1
    subject: visible metal fasteners and weak show-face joint expression
    suspected_issue: Earlier architectures exposed or concealed metal hardware through extra internal parts rather than resolving the furniture corner directly.
    severity: HIGH
    visual_evidence: v4_top.png and g2_joint.png now show a clean top and a glued hardwood miter crossed only by flush wooden keys.
    renders:
      - path: outputs/armchair_caddy/views/v4_top.png
      - path: outputs/armchair_caddy/views/g2_joint.png
    invariant_family: UNKNOWN
    recommended_action: Use the selected reinforced-miter architecture and retain its no-metal exterior.
    resolution:
      status: fixed-by-revision
      note: Fixed by the precedent-first reinforced-miter revision; the former metal-fastener and auxiliary-cleat approaches were deleted from production geometry and each corner is now keyed by two hardwood dowels.

  - id: D2
    subject: material coherence — furniture hardwood for every visible panel
    suspected_issue: Construction lumber and treated decking did not match an appearance-prioritized living-room object.
    severity: HIGH
    visual_evidence: g1_iso.png shows one coherent three-panel material language across every visible surface.
    renders:
      - path: outputs/armchair_caddy/views/g1_iso.png
      - path: outputs/armchair_caddy/views/v4_top.png
    invariant_family: UNKNOWN
    recommended_action: Cut all three panels from matching indoor furniture hardwood; select species and grade for appearance and workability.
    resolution:
      status: fixed-by-revision
      note: Fixed by the new hardwood panel component and Indoor hardwood BOM material. Species and grade remain a builder selection rather than an analyzed structural claim.

  - id: D3
    subject: cup-bore rim, bore-wall finish, and upholstery protection
    suspected_issue: The bore rim and wall need deliberate finishing, and a wet cup can still transfer moisture toward the chair.
    severity: MEDIUM
    visual_evidence: z1_cup.png exposes the full-thickness bore and the context arm below it.
    renders:
      - path: outputs/armchair_caddy/views/z1_cup.png
    invariant_family: UNKNOWN
    recommended_action: Ease and seal the bore by hand and evaluate a removable coaster insert in a later governed design increment.
    resolution:
      status: unresolved
      note: ""

  - id: D4
    subject: edge treatment and finish schedule
    suspected_issue: The modeled long-edge ease does not fully specify end-grain, miter-edge, bore-rim, or coating treatment.
    severity: LOW
    visual_evidence: g1_iso.png and z1_cup.png show the exposed bottom ends and cup rim that need builder finish decisions.
    renders:
      - path: outputs/armchair_caddy/views/g1_iso.png
      - path: outputs/armchair_caddy/views/z1_cup.png
    invariant_family: UNKNOWN
    recommended_action: Add first-class finish and feature-edge operations in a later fabrication vocabulary increment.
    resolution:
      status: unresolved
      note: ""

  - id: D5
    subject: fit range across real upholstered arms
    suspected_issue: A fixed 6.5-inch opening covers the governed example but does not establish a broad commercial fit range.
    severity: MEDIUM
    visual_evidence: v2_front.png and z3_gap.png show the modeled 6-inch arm and the 1/4-inch nominal clearance at each side.
    renders:
      - path: outputs/armchair_caddy/views/v2_front.png
      - path: outputs/armchair_caddy/views/z3_gap.png
    invariant_family: UNKNOWN
    recommended_action: Measure the intended chair and publish a parameterized fit-range study before offering multiple sizes.
    resolution:
      status: unresolved
      note: ""

  - id: D6
    subject: auxiliary internal parts accumulated through local repair
    suspected_issue: The previous production design used two unusual full-depth internal members whose part, operation, and visual costs were not justified by precedent.
    severity: HIGH
    visual_evidence: g1_iso.png and g3_underside.png now show only the three functional shell panels and four small joint keys.
    renders:
      - path: outputs/armchair_caddy/views/g1_iso.png
      - path: outputs/armchair_caddy/views/g3_underside.png
    invariant_family: UNKNOWN
    recommended_action: Retain the selected precedent-supported reinforced miter unless a future requirement explicitly forces another part.
    resolution:
      status: fixed-by-revision
      note: Fixed by the governed concept comparison and simplification review; the two auxiliary internal members were eliminated, and each remaining part has a unique shell, fit, cup-support, or joint-keying purpose.
