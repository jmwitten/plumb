# DetailSpec — governed three-panel reinforced-miter armchair caddy.
#
# Three matching 3/4-inch hardwood panels form a removable waterfall sleeve.
# Each 45-degree glued corner is mechanically keyed by two 3/8-inch hardwood
# dowels, following the retained Woodworker's Journal precedent. The side
# panels themselves define the fit opening; no internal rails or metal
# fasteners remain. Capacity and hot-drink stability remain explicitly
# unanalyzed.

name: armchair caddy
type: armchair_caddy
units: in

design_review:
  record: armchair_caddy.design-review.yaml
  selected_concept: reinforced_miter

params:
  arm_w: 6.0
  arm_l: 10.0
  arm_h: 8.0
  panel_thk: 0.75
  panel_width: 5.5
  side_drop: 7.0
  arm_gap: 0.25
  ease_r: 0.125
  cup_dia: 3.5
  dowel_dia: 0.375
  dowel_edge_station: 1.1875

derived:
  inner_span: "= arm_w + 2*arm_gap"
  side_inner_x: "= inner_span / 2"
  side_outer_x: "= side_inner_x + panel_thk"
  top_long_len: "= inner_span + 2*panel_thk"
  side_long_len: "= side_drop + panel_thk"
  side_bot_z: "= -side_drop"
  top_top_z: "$panel_thk"
  dowel_finish_len: "= (2 ** 0.5) * panel_thk"
  dowel_station_near: "= -panel_width/2 + dowel_edge_station"
  dowel_station_far: "= panel_width/2 - dowel_edge_station"

components:
  - id: arm
    type: boulder
    name: sofa arm
    reader_name: Sofa arm
    params: {width: "$arm_l", length: "$arm_w", depth: "$arm_h"}

  - id: top
    type: hardwood_panel
    name: top panel
    reader_name: Top panel
    params:
      length: "$top_long_len"
      width: "$panel_width"
      thickness: "$panel_thk"
      miter_ends: [near, far]
      ease_radius: "$ease_r"
    place:
      raw:
        at: ["= -top_long_len/2", "= -panel_width/2", "0 in"]
    features:
      - bore: {dia: $cup_dia, id: cup_hole, name: "cup hole"}

  - id: side_pos
    type: hardwood_panel
    name: side panel +X
    reader_name: Side panel
    params:
      length: "$side_long_len"
      width: "$panel_width"
      thickness: "$panel_thk"
      miter_ends: [far]
      ease_radius: "$ease_r"
    place:
      raw:
        at: ["$side_inner_x", "= panel_width/2", "$side_bot_z"]
        rotate: [["Y", -90], ["Z", 180]]

  - id: side_neg
    type: hardwood_panel
    name: side panel -X
    reader_name: Side panel
    params:
      length: "$side_long_len"
      width: "$panel_width"
      thickness: "$panel_thk"
      miter_ends: [far]
      ease_radius: "$ease_r"
    place:
      raw:
        at: ["= -side_inner_x", "= -panel_width/2", "$side_bot_z"]
        rotate: [["Y", -90]]

  - id: dowel_pos_near
    type: wood_dowel
    name: corner key +X front
    reader_name: Corner key
    params: {diameter: "$dowel_dia", length: "$dowel_finish_len", end_trim: miter_flush}
    place:
      raw:
        at: ["$side_inner_x", "$dowel_station_near", "$top_top_z"]
        rotate: [["Y", 45]]

  - id: dowel_pos_far
    type: wood_dowel
    name: corner key +X back
    reader_name: Corner key
    params: {diameter: "$dowel_dia", length: "$dowel_finish_len", end_trim: miter_flush}
    place:
      raw:
        at: ["$side_inner_x", "$dowel_station_far", "$top_top_z"]
        rotate: [["Y", 45]]

  - id: dowel_neg_near
    type: wood_dowel
    name: corner key -X front
    reader_name: Corner key
    params: {diameter: "$dowel_dia", length: "$dowel_finish_len", end_trim: miter_flush}
    place:
      raw:
        at: ["= -side_inner_x", "$dowel_station_near", "$top_top_z"]
        rotate: [["X", 180], ["Y", 135]]

  - id: dowel_neg_far
    type: wood_dowel
    name: corner key -X back
    reader_name: Corner key
    params: {diameter: "$dowel_dia", length: "$dowel_finish_len", end_trim: miter_flush}
    place:
      raw:
        at: ["= -side_inner_x", "$dowel_station_far", "$top_top_z"]
        rotate: [["X", 180], ["Y", 135]]

connections:
  - type: dowel_reinforced_miter
    label: "top -> side +X (dowel-reinforced miter)"
    parts: [top, side_pos]
    hardware: [dowel_pos_near, dowel_pos_far]
    assumptions:
      - "The two 3/4in hardwood miter faces and both 3/8in corner-key dowels receive wood glue; the dowels cross the joint at its thickness centerline. Adhesive, dowel, and joint capacity are NOT analyzed."
    process:
      cure:
        instructions:
          - "Dry-fit the 45-degree miter, then spread the selected wood adhesive on both prepared miter faces and into both dowel holes."
          - "Insert both corner keys, clamp the corner closed in both directions, and maintain the selected adhesive label's required fixture state."
        completion: selected_label_full_cure
        why: >-
          The selected adhesive label and actual shop conditions govern when
          this keyed hardwood miter reaches full cure/full strength.

  - type: dowel_reinforced_miter
    label: "top -> side -X (dowel-reinforced miter)"
    parts: [top, side_neg]
    hardware: [dowel_neg_near, dowel_neg_far]
    assumptions:
      - "The two 3/4in hardwood miter faces and both 3/8in corner-key dowels receive wood glue; the dowels cross the joint at its thickness centerline. Adhesive, dowel, and joint capacity are NOT analyzed."
    process:
      cure:
        instructions:
          - "Dry-fit the 45-degree miter, then spread the selected wood adhesive on both prepared miter faces and into both dowel holes."
          - "Insert both corner keys, clamp the corner closed in both directions, and maintain the selected adhesive label's required fixture state."
        completion: selected_label_full_cure
        why: >-
          The selected adhesive label and actual shop conditions govern when
          this keyed hardwood miter reaches full cure/full strength.

sequence:
  assembly:
    mode: bench_then_set
    why: >-
      The three panels and four corner keys form one loose unit assembled,
      clamped, cured, trimmed, sanded, and finished off the sofa. The completed
      caddy is then carried to the chair and lowered over the connection-free
      sofa-arm context. Arm exclusion is DECLARED TRUST until insertion travel
      over the upholstery is analyzed.

roles:
  arm: {role: existing, grounded_by: site}

validation:
  bearings:
    - {a: top, b: arm, axis: Z, area: 2000}
  dimensions:
    - name: "top panel underside rests on the arm top"
      part: top
      measure: zmin
      expected: "0 in"
      tolerance: "0.02 in"
    - name: "top panel retains the eight-inch outside long point"
      part: top
      measure: xlen
      expected: "$top_long_len"
      tolerance: "0.02 in"
    - name: "positive side inside face sets the clear opening"
      part: side_pos
      measure: xmin
      expected: "$side_inner_x"
      tolerance: "0.02 in"
    - name: "side panel retains seven inches below the top underside"
      part: side_pos
      measure: zmin
      expected: "$side_bot_z"
      tolerance: "0.02 in"

callouts:
  - {param: inner_span, label: "CLEAR OPENING {v}", p0: ["= -inner_span/2", "= panel_width/2 + 1", "$panel_thk"], p1: ["= inner_span/2", "= panel_width/2 + 1", "$panel_thk"]}
  - {param: side_drop, label: "{v} DROP", p0: ["= side_outer_x + 1", 0, 0], p1: ["= side_outer_x + 1", 0, "= -side_drop"]}
  - {param: cup_dia, label: "CUP {v}", p0: ["= -cup_dia/2", 0, "= panel_thk + 0.5"], p1: ["= cup_dia/2", 0, "= panel_thk + 0.5"]}

export: {glb_tolerance: 0.1, glb_angular_tolerance: 0.15}

doc:
  sections:
    - prose: |
        # Armchair Coffee Caddy — Validation Report

        A removable three-panel hardwood sleeve with two glued 45-degree miters. Two 3/8" diagonal hardwood corner keys reinforce each joint at 1-3/16" from the front and back edges. The side panels directly define a 6.5" clear opening around the modeled 6" sofa arm; no registration rails or metal fasteners remain. The centered 3.5" cup hole is retained.
    - findings: {header: "## Bearing contact", check: bearing}
    - hardware_presence: {header: "## Corner-key presence", cap: 4}
    - derivation_log:
        header: "## Construction Graph — derivation log"
        preamble: "Each corner derives its adhesive bond, mechanical keying, allowed dowel intersections, cure fact, and load-path evidence from a declared dowel_reinforced_miter connection:"
        mode: per_connection
        cap: 32
    - findings: {header: "## Dimension checks", check: dimension}
    - prose: "## Result: **{result_verdict}**"
    - bom_table: {header: "## Bill of materials"}
    - prose: |
        ## Modeling assumptions & honest limits
        - **Gravity saddle.** The caddy rests on the arm top and lifts off by hand; nothing fastens to upholstery.
        - **Panel-defined fit.** Matching 3/4" sides leave a 6.5" clear opening, or 1/4" nominal clearance at each side of the modeled 6" arm. Upholstery compression and insertion travel are not analyzed.
        - **Reinforced miters.** Each prepared 45-degree hardwood joint receives adhesive and two 3/8" diagonal corner keys. The selected adhesive label governs clamping and cure. Adhesive, dowel, panel, and joint capacity are NOT analyzed.
        - **Cup opening.** The centered 3.5" full-thickness bore remains a loose-fit feature; verify the intended cup before finishing.
        - **Hot-drink stability is NOT ANALYZED.** Test the finished empty caddy for rocking and sliding on the actual chair before use.
